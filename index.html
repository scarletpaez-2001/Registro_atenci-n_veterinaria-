<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Atención Veterinaria</title>
    <style>
        /* Diseño  */
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .contenedor { max-width: 600px; background: white; padding: 20px; border-radius: 8px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-weight: bold; margin-bottom: 15px; display: none; }
        .mascota-card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 5px; background: #fafafa; }
        .btn-atender { background-color: #28a745; width: auto; margin-top: 5px; padding: 5px 10px; }
        .btn-atender:hover { background-color: #218838; }
        .estadisticas { margin-top: 20px; background: #e9ecef; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Registro de Atención Veterinaria</h1>
    
    <!-- Mostrar mensajes de error sin usar alert() -->
    <div id="mensajeError" class="error"></div>

    <!-- Formulario -->
    <div class="campo">
        <label>Nombre de la mascota:</label>
        <input type="text" id="nombreMascota">
    </div>
    <div class="campo">
        <label>Especie:</label>
        <select id="especieMascota">
            <option value="Perro">Perro</option>
            <option value="Gato">Gato</option>
            <option value="Ave">Ave</option>
            <option value="Otro">Otro</option>
        </select>
    </div>
    <div class="campo">
        <label>Nombre del propietario:</label>
        <input type="text" id="propietarioMascota">
    </div>
    <div class="campo">
        <label>Edad (en años):</label>
        <input type="number" id="edadMascota">
    </div>
    
    <button onclick="registrarMascota()">Registrar Mascota</button>

    <!-- Estadísticas -->
    <div class="estadisticas">
        <h3>Estadísticas de Atención</h3>
        <p>Total Registradas: <span id="totalMascotas">0</span></p>
        <p>Pendientes: <span id="totalPendientes">0</span></p>
        <p>Atendidas: <span id="totalAtendidas">0</span></p>
    </div>

    <!-- Listado de Mascotas -->
    <h2>Pacientes Registrados</h2>
    <div id="listaMascotas"></div>
</div>

<!-- Conectar el archivo a js  -->
<script src="script.js"></script>
</body>
</html>
